<svg xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1280"
    height="720"
    viewBox="0 0 1280 720"
    fill="none">

    <defs>
        <filter id="blurSmall" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" />
        </filter>

        <filter id="blurMedium" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="10" />
        </filter>

        <filter id="blurLarge" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="18" />
        </filter>

        <radialGradient id="dustGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f7ddb0" stop-opacity="0.65" />
            <stop offset="100%" stop-color="#f7ddb0" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="groundShimmer" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f1c77a" stop-opacity="0" />
            <stop offset="35%" stop-color="#f1c77a" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#f1c77a" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="warmHaze" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#e8c38c" stop-opacity="0" />
            <stop offset="50%" stop-color="#f0d3aa" stop-opacity="0.08" />
            <stop offset="100%" stop-color="#e8c38c" stop-opacity="0" />
        </linearGradient>

        <symbol id="leafSmall" viewBox="0 0 24 12">
            <path d="M1,6 C6,1 14,0 23,6 C14,12 6,11 1,6 Z"
                fill="#6c7d4d"
                fill-opacity="0.22" />
            <path d="M2,6 L22,6"
                stroke="#889a62"
                stroke-opacity="0.18"
                stroke-width="0.8" />
        </symbol>
    </defs>

    <!-- Humid haze kept subtle and mostly away from the lower center -->
    <g filter="url(#blurLarge)">
        <ellipse cx="260" cy="190" rx="190" ry="60" fill="url(#warmHaze)" opacity="0.16">
            <animate attributeName="cx" values="240;285;240" dur="18s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.10;0.18;0.10" dur="18s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="980" cy="165" rx="210" ry="70" fill="url(#warmHaze)" opacity="0.14">
            <animate attributeName="cx" values="1000;955;1000" dur="22s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.16;0.08" dur="22s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="640" cy="250" rx="260" ry="55" fill="url(#warmHaze)" opacity="0.08">
            <animate attributeName="cx" values="620;660;620" dur="26s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.04;0.09;0.04" dur="26s"
                repeatCount="indefinite" />
        </ellipse>
    </g>

    <!-- Late-afternoon dust motes -->
    <g filter="url(#blurSmall)">
        <circle r="4" fill="url(#dustGlow)">
            <animate attributeName="cx" values="120;160;120" dur="11s" repeatCount="indefinite" />
            <animate attributeName="cy" values="520;470;520" dur="11s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.22;0.10;0" dur="11s"
                repeatCount="indefinite" />
        </circle>

        <circle r="3" fill="url(#dustGlow)">
            <animate attributeName="cx" values="280;320;280" dur="9s" repeatCount="indefinite" />
            <animate attributeName="cy" values="410;360;410" dur="9s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.16;0.08;0" dur="9s"
                repeatCount="indefinite" />
        </circle>

        <circle r="3.5" fill="url(#dustGlow)">
            <animate attributeName="cx" values="470;510;470" dur="13s" repeatCount="indefinite" />
            <animate attributeName="cy" values="315;270;315" dur="13s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.18;0.08;0" dur="13s"
                repeatCount="indefinite" />
        </circle>

        <circle r="2.8" fill="url(#dustGlow)">
            <animate attributeName="cx" values="720;760;720" dur="10s" repeatCount="indefinite" />
            <animate attributeName="cy" values="390;340;390" dur="10s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.14;0.07;0" dur="10s"
                repeatCount="indefinite" />
        </circle>

        <circle r="4.2" fill="url(#dustGlow)">
            <animate attributeName="cx" values="950;985;950" dur="12s" repeatCount="indefinite" />
            <animate attributeName="cy" values="295;245;295" dur="12s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.18;0.08;0" dur="12s"
                repeatCount="indefinite" />
        </circle>

        <circle r="3.2" fill="url(#dustGlow)">
            <animate attributeName="cx" values="1110;1150;1110" dur="8s" repeatCount="indefinite" />
            <animate attributeName="cy" values="455;405;455" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.16;0.06;0" dur="8s"
                repeatCount="indefinite" />
        </circle>

        <circle r="2.6" fill="url(#dustGlow)">
            <animate attributeName="cx" values="210;250;210" dur="14s" repeatCount="indefinite" />
            <animate attributeName="cy" values="260;220;260" dur="14s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.12;0.05;0" dur="14s"
                repeatCount="indefinite" />
        </circle>

        <circle r="2.9" fill="url(#dustGlow)">
            <animate attributeName="cx" values="860;900;860" dur="15s" repeatCount="indefinite" />
            <animate attributeName="cy" values="215;175;215" dur="15s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.13;0.05;0" dur="15s"
                repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Slow leaf drift near edges only -->
    <g opacity="0.9">
        <g transform="translate(64 92)">
            <use xlink:href="#leafSmall" width="24" height="12" />
            <animateTransform attributeName="transform"
                type="translate"
                values="64 92; 96 128; 118 182"
                dur="15s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="-4 12 6; 7 12 6; -3 12 6"
                dur="15s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.24;0.24;0" dur="15s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(1180 110)">
            <use xlink:href="#leafSmall" width="24" height="12" />
            <animateTransform attributeName="transform"
                type="translate"
                values="1180 110; 1140 145; 1100 205"
                dur="18s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="6 12 6; -6 12 6; 5 12 6"
                dur="18s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.20;0.20;0" dur="18s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(86 330)">
            <use xlink:href="#leafSmall" width="24" height="12" />
            <animateTransform attributeName="transform"
                type="translate"
                values="86 330; 120 360; 150 412"
                dur="17s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="-8 12 6; 8 12 6; -5 12 6"
                dur="17s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.18;0.18;0" dur="17s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(1138 360)">
            <use xlink:href="#leafSmall" width="24" height="12" />
            <animateTransform attributeName="transform"
                type="translate"
                values="1138 360; 1095 390; 1058 445"
                dur="16s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="4 12 6; -7 12 6; 3 12 6"
                dur="16s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.16;0.16;0" dur="16s"
                repeatCount="indefinite" />
        </g>
    </g>

    <!-- Faint warm ground-light shimmer, kept very subtle -->
    <g filter="url(#blurMedium)">
        <rect x="120" y="500" width="1040" height="90" fill="url(#groundShimmer)" opacity="0.20">
            <animate attributeName="opacity" values="0.10;0.22;0.12;0.20;0.10" dur="9s"
                repeatCount="indefinite" />
        </rect>

        <rect x="220" y="560" width="840" height="70" fill="url(#groundShimmer)" opacity="0.12">
            <animate attributeName="opacity" values="0.05;0.14;0.07;0.12;0.05" dur="7s"
                repeatCount="indefinite" />
        </rect>
    </g>

    <!-- Soft edge atmosphere to help the scene feel humid and alive -->
    <g filter="url(#blurMedium)">
        <ellipse cx="70" cy="610" rx="80" ry="110" fill="#d5bb8c" opacity="0.05">
            <animate attributeName="opacity" values="0.02;0.06;0.02" dur="20s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="1210" cy="590" rx="70" ry="95" fill="#d5bb8c" opacity="0.05">
            <animate attributeName="opacity" values="0.02;0.05;0.02" dur="23s"
                repeatCount="indefinite" />
        </ellipse>
    </g>
</svg>