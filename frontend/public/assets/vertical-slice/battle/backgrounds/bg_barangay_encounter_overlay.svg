<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
    <defs>
        <radialGradient id="dustGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFE0A3" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#FFE0A3" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="groundShimmer" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FFD27A" stop-opacity="0" />
            <stop offset="45%" stop-color="#FFD27A" stop-opacity="0.08" />
            <stop offset="60%" stop-color="#FFF1B8" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#FFD27A" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="warmHaze" x1="0" y1="720" x2="0" y2="430">
            <stop offset="0%" stop-color="#FFC36B" stop-opacity="0.12" />
            <stop offset="55%" stop-color="#FFC36B" stop-opacity="0.04" />
            <stop offset="100%" stop-color="#FFC36B" stop-opacity="0" />
        </linearGradient>

        <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.8" />
        </filter>

        <filter id="tinyBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.1" />
        </filter>

        <symbol id="smallLeaf" viewBox="-8 -5 16 10">
            <path d="M-7 0C-3.5-5 4.2-5.2 7 0C3.7 4.8-3.8 5-7 0Z" fill="#8FAE58" opacity="0.42" />
            <path d="M-5.4 0C-1.8-0.8 2.2-0.6 5.4 0" stroke="#F2C979" stroke-width="0.7"
                stroke-linecap="round" opacity="0.35" />
        </symbol>

        <symbol id="palmLeaf" viewBox="-10 -6 20 12">
            <path d="M-9 1C-5-6 4-5 9-1C3 2-3 5-9 1Z" fill="#6F9F4F" opacity="0.32" />
            <path d="M-6.5 0.8C-2.2-0.7 3-1.2 7-1" stroke="#FFE0A3" stroke-width="0.65"
                stroke-linecap="round" opacity="0.22" />
        </symbol>
    </defs>
    <g id="transparent-overlay-base">
        <path d="M0 430H1280V720H0Z" fill="url(#warmHaze)">
            <animate attributeName="opacity" values="0.45;0.7;0.45" dur="7s"
                repeatCount="indefinite" />
        </path>
        <ellipse cx="640" cy="642" rx="500" ry="48" fill="url(#groundShimmer)"
            filter="url(#softBlur)" opacity="0.36">
            <animate attributeName="opacity" values="0.18;0.34;0.18" dur="5.8s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="-90 0;90 0;-90 0"
                dur="12s" repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="640" cy="590" rx="430" ry="30" fill="url(#groundShimmer)"
            filter="url(#softBlur)" opacity="0.18">
            <animate attributeName="opacity" values="0.08;0.18;0.08" dur="8.5s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="80 0;-80 0;80 0"
                dur="15s" repeatCount="indefinite" />
        </ellipse>
    </g>
    <g id="late-afternoon-dust-motes" filter="url(#tinyBlur)">
        <g opacity="0.45">
            <circle cx="120" cy="128" r="2.6" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.12;0.48;0.12" dur="5.5s" begin="0s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;18 -22;0 0"
                    dur="13s" repeatCount="indefinite" />
            </circle>
            <circle cx="245" cy="202" r="1.8" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.05;0.35;0.05" dur="6.4s" begin="1.1s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="0 0;-16 -28;0 0" dur="15s" repeatCount="indefinite" />
            </circle>
            <circle cx="420" cy="115" r="2.1" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.08;0.38;0.08" dur="6.8s" begin="0.4s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;24 -18;0 0"
                    dur="16s" repeatCount="indefinite" />
            </circle>
            <circle cx="832" cy="138" r="2.2" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.06;0.42;0.06" dur="5.9s" begin="1.7s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="0 0;-22 -20;0 0" dur="14s" repeatCount="indefinite" />
            </circle>
            <circle cx="1040" cy="194" r="2.7" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.08;0.48;0.08" dur="7.2s" begin="0.6s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;14 -30;0 0"
                    dur="17s" repeatCount="indefinite" />
            </circle>
            <circle cx="1168" cy="102" r="1.9" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.05;0.36;0.05" dur="5.6s" begin="2s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="0 0;-24 -16;0 0" dur="13.5s" repeatCount="indefinite" />
            </circle>
        </g>
        <g opacity="0.28">
            <circle cx="165" cy="515" r="2.1" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.04;0.22;0.04" dur="8s" begin="0.2s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;28 -10;0 0"
                    dur="18s" repeatCount="indefinite" />
            </circle>
            <circle cx="1115" cy="535" r="2" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.04;0.24;0.04" dur="7.6s" begin="1.4s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="0 0;-30 -12;0 0" dur="19s" repeatCount="indefinite" />
            </circle>
            <circle cx="330" cy="612" r="1.7" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.03;0.16;0.03" dur="9.2s" begin="2.2s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;18 -8;0 0"
                    dur="20s" repeatCount="indefinite" />
            </circle>
            <circle cx="940" cy="620" r="1.6" fill="url(#dustGlow)">
                <animate attributeName="opacity" values="0.03;0.16;0.03" dur="8.8s" begin="1.8s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0;-18 -8;0 0"
                    dur="20s" repeatCount="indefinite" />
            </circle>
        </g>
    </g>
    <g id="soft-leaf-drift-left-edge">
        <use href="#smallLeaf" x="44" y="88" width="18" height="12" opacity="0.44">
            <animateTransform attributeName="transform" type="translate" values="0 0;42 58;88 124"
                dur="18s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.44;0.28;0" dur="18s"
                repeatCount="indefinite" />
        </use>
        <use href="#palmLeaf" x="72" y="284" width="24" height="15" opacity="0.34">
            <animateTransform attributeName="transform" type="translate" values="0 0;34 46;72 102"
                dur="20s" begin="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.34;0.2;0" dur="20s" begin="2s"
                repeatCount="indefinite" />
        </use>

        <use href="#smallLeaf" x="22" y="450" width="16" height="10" opacity="0.3">
            <animateTransform attributeName="transform" type="translate" values="0 0;58 24;112 64"
                dur="22s" begin="4s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.3;0.18;0" dur="22s" begin="4s"
                repeatCount="indefinite" />
        </use>
    </g>
    <g id="soft-leaf-drift-right-edge">
        <use href="#palmLeaf" x="1198" y="108" width="25" height="16" opacity="0.36">
            <animateTransform attributeName="transform" type="translate" values="0 0;-42 54;-84 112"
                dur="19s" begin="1s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.36;0.22;0" dur="19s" begin="1s"
                repeatCount="indefinite" />
        </use>
        <use href="#smallLeaf" x="1228" y="330" width="18" height="12" opacity="0.38">
            <animateTransform attributeName="transform" type="translate" values="0 0;-36 36;-94 82"
                dur="21s" begin="3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.38;0.2;0" dur="21s" begin="3s"
                repeatCount="indefinite" />
        </use>

        <use href="#smallLeaf" x="1172" y="520" width="16" height="10" opacity="0.26">
            <animateTransform attributeName="transform" type="translate" values="0 0;-48 18;-108 52"
                dur="23s" begin="5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.26;0.16;0" dur="23s" begin="5s"
                repeatCount="indefinite" />
        </use>
    </g>
    <g id="upper-corner-light-specks" filter="url(#tinyBlur)" opacity="0.35">
        <circle cx="58" cy="54" r="3.4" fill="#FFE7A8" opacity="0">
            <animate attributeName="opacity" values="0;0.24;0" dur="6s" begin="0.5s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1220" cy="72" r="3.1" fill="#FFE7A8" opacity="0">
            <animate attributeName="opacity" values="0;0.22;0" dur="7s" begin="2s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="92" cy="242" r="2.4" fill="#FFE7A8" opacity="0">
            <animate attributeName="opacity" values="0;0.18;0" dur="8s" begin="3.4s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1188" cy="260" r="2.6" fill="#FFE7A8" opacity="0">
            <animate attributeName="opacity" values="0;0.18;0" dur="8.6s" begin="1.2s"
                repeatCount="indefinite" />
        </circle>
    </g>
</svg>