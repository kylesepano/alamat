    <g id="subtle-rear-haze" opacity="0.22" filter="url(#blurMid)">
        <ellipse cx="230" cy="300" rx="120" ry="32" fill="#F7C97A">
            <animate attributeName="opacity" values="0.10;0.22;0.12" dur="10s"
