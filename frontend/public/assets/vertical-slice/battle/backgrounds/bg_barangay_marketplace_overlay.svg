<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
    <defs>
        <linearGradient id="smokeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7A7A7A" stop-opacity="0.16" />
            <stop offset="55%" stop-color="#8F857A" stop-opacity="0.10" />
            <stop offset="100%" stop-color="#B29A74" stop-opacity="0" />
        </linearGradient>
        <radialGradient id="dustGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFE5B2" stop-opacity="0.42" />
            <stop offset="100%" stop-color="#FFE5B2" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="glintGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF6CC" stop-opacity="0.65" />
            <stop offset="55%" stop-color="#FFD98A" stop-opacity="0.22" />
            <stop offset="100%" stop-color="#FFD98A" stop-opacity="0" />
        </radialGradient>

        <filter id="blurLarge" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="18" />
        </filter>

        <filter id="blurMid" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="8" />
        </filter>

        <filter id="blurSmall" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="2.2" />
        </filter>

        <symbol id="spark" viewBox="-8 -8 16 16">
            <path d="M0-5.2L0.9-0.9L5.2 0L0.9 0.9L0 5.2L-0.9 0.9L-5.2 0L-0.9-0.9Z" fill="#FFE7A8"
                opacity="0.95" />
        </symbol>
    </defs>
    <g id="forge-smoke-rear" opacity="0.55" filter="url(#blurLarge)">
        <path
            d="M160 360C122 323 122 265 161 230C189 205 235 206 257 240C275 267 268 307 236 333C214 351 189 360 160 360Z"
            fill="url(#smokeGrad)">
            <animateTransform attributeName="transform" type="translate"
                values="0 0; 12 -24; -6 -42; 0 -58" dur="16s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.10;0.18;0.12;0.06" dur="16s"
                repeatCount="indefinite" />
        </path>
        <path
            d="M278 320C248 287 256 242 289 218C313 200 352 206 370 234C388 262 382 299 349 320C329 333 302 336 278 320Z"
