<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
    <defs>
        <linearGradient id="mistBlueA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#BFDFFF" stop-opacity="0" />
            <stop offset="35%" stop-color="#CFE9FF" stop-opacity="0.13" />
            <stop offset="68%" stop-color="#FFE2A6" stop-opacity="0.07" />
            <stop offset="100%" stop-color="#BFDFFF" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="mistBlueB" x1="1" y1="0" x2="0" y2="0">
            <stop offset="0%" stop-color="#D5EAFF" stop-opacity="0" />
            <stop offset="42%" stop-color="#D5EAFF" stop-opacity="0.11" />
            <stop offset="72%" stop-color="#AFCFFF" stop-opacity="0.07" />
            <stop offset="100%" stop-color="#D5EAFF" stop-opacity="0" />
        </linearGradient>

        <radialGradient id="spiritMoteBlue" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EAF7FF" stop-opacity="0.9" />
            <stop offset="38%" stop-color="#7FD6FF" stop-opacity="0.42" />
