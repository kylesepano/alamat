<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <defs>
        <linearGradient id="mistGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#8ed8ff" stop-opacity="0" />
            <stop offset="50%" stop-color="#b8e7ff" stop-opacity="0.18" />
            <stop offset="100%" stop-color="#8ed8ff" stop-opacity="0" />
        </linearGradient>

        <radialGradient id="moteBlue" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#baf0ff" stop-opacity="0.95" />
            <stop offset="45%" stop-color="#66cfff" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#66cfff" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="moteGold" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff4be" stop-opacity="0.95" />
            <stop offset="45%" stop-color="#d9b35a" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#d9b35a" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="rootBlue" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#75d7ff" stop-opacity="0" />
            <stop offset="50%" stop-color="#75d7ff" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#75d7ff" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="rootGold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f1c66f" stop-opacity="0" />
            <stop offset="50%" stop-color="#f1c66f" stop-opacity="0.38" />
            <stop offset="100%" stop-color="#f1c66f" stop-opacity="0" />
        </linearGradient>

        <filter id="blurSmall" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" />
        </filter>

        <filter id="blurMed" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" />
        </filter>

        <filter id="blurLarge" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="14" />
        </filter>
    </defs>

    <!-- drifting mist kept mostly to upper and side areas -->
    <g id="mist" filter="url(#blurLarge)" opacity="0.75">
        <ellipse cx="180" cy="150" rx="170" ry="38" fill="url(#mistGrad)">
            <animate attributeName="cx" values="180;235;180" dur="24s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.22;0.34;0.22" dur="18s"
                repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="1015" cy="125" rx="210" ry="42" fill="url(#mistGrad)">
            <animate attributeName="cx" values="1015;955;1015" dur="28s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.18;0.3;0.18" dur="19s"
                repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="165" cy="430" rx="150" ry="30" fill="url(#mistGrad)">
            <animate attributeName="cx" values="165;225;165" dur="30s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.12;0.22;0.12" dur="16s"
                repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="1115" cy="455" rx="145" ry="30" fill="url(#mistGrad)">
            <animate attributeName="cx" values="1115;1060;1115" dur="26s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.12;0.22;0.12" dur="17s"
                repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="640" cy="92" rx="260" ry="28" fill="url(#mistGrad)">
            <animate attributeName="cy" values="92;102;92" dur="22s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.16;0.08" dur="15s"
                repeatCount="indefinite" />
        </ellipse>
    </g>

    <!-- faint root glow pulses along upper edges and far sides -->
    <g id="root-glow" fill="none" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#blurSmall)">
        <path d="M65 88 C110 72, 142 84, 168 112 S225 152, 262 137 S320 98, 350 106"
            stroke="url(#rootBlue)" stroke-width="3.2">
            <animate attributeName="stroke-opacity" values="0.18;0.38;0.18" dur="8.5s"
                repeatCount="indefinite" />
        </path>
        <path d="M934 101 C970 82, 1010 90, 1046 112 S1112 149, 1154 136 S1200 98, 1232 104"
            stroke="url(#rootGold)" stroke-width="3">
            <animate attributeName="stroke-opacity" values="0.14;0.34;0.14" dur="9.5s"
                repeatCount="indefinite" />
        </path>
        <path d="M84 528 C118 500, 124 456, 112 412 S98 335, 118 290" stroke="url(#rootBlue)"
            stroke-width="2.8">
            <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="10s"
                repeatCount="indefinite" />
        </path>
        <path d="M1194 516 C1166 492, 1160 450, 1172 400 S1190 326, 1174 276"
            stroke="url(#rootGold)" stroke-width="2.8">
            <animate attributeName="stroke-opacity" values="0.1;0.28;0.1" dur="11s"
                repeatCount="indefinite" />
        </path>
        <path d="M470 80 C520 64, 566 68, 612 86" stroke="url(#rootGold)" stroke-width="2.4">
            <animate attributeName="stroke-opacity" values="0.08;0.22;0.08" dur="12s"
                repeatCount="indefinite" />
        </path>
        <path d="M668 84 C715 68, 760 70, 810 88" stroke="url(#rootBlue)" stroke-width="2.4">
            <animate attributeName="stroke-opacity" values="0.08;0.22;0.08" dur="13s"
                repeatCount="indefinite" />
        </path>
    </g>

    <!-- spirit motes placed around edges; center/lower floor remains clear -->
    <g id="motes-blue" filter="url(#blurSmall)">
        <circle cx="135" cy="118" r="4" fill="url(#moteBlue)">
            <animate attributeName="cy" values="118;98;118" dur="8s" repeatCount="indefinite" />
            <animate attributeName="cx" values="135;142;135" dur="10s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.15;0.75;0.15" dur="6.5s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="238" cy="154" r="3.2" fill="url(#moteBlue)">
            <animate attributeName="cy" values="154;132;154" dur="9.2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.12;0.62;0.12" dur="5.4s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1090" cy="135" r="4.2" fill="url(#moteBlue)">
            <animate attributeName="cy" values="135;108;135" dur="9.5s" repeatCount="indefinite" />
            <animate attributeName="cx" values="1090;1082;1090" dur="11s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.16;0.8;0.16" dur="6.8s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1180" cy="196" r="3" fill="url(#moteBlue)">
            <animate attributeName="cy" values="196;170;196" dur="11s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.1;0.55;0.1" dur="7s" repeatCount="indefinite" />
        </circle>
        <circle cx="156" cy="362" r="3.6" fill="url(#moteBlue)">
            <animate attributeName="cy" values="362;334;362" dur="10.2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.5;0.08" dur="6s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1118" cy="388" r="3.6" fill="url(#moteBlue)">
            <animate attributeName="cy" values="388;360;388" dur="10.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.5;0.08" dur="6.4s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="84" cy="552" r="2.8" fill="url(#moteBlue)">
            <animate attributeName="cy" values="552;525;552" dur="12s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.05;0.42;0.05" dur="8s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1194" cy="540" r="2.8" fill="url(#moteBlue)">
            <animate attributeName="cy" values="540;512;540" dur="12.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.05;0.42;0.05" dur="8.2s"
                repeatCount="indefinite" />
        </circle>
    </g>

    <g id="motes-gold" filter="url(#blurSmall)">
        <circle cx="330" cy="103" r="3.2" fill="url(#moteGold)">
            <animate attributeName="cy" values="103;81;103" dur="8.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.1;0.65;0.1" dur="5.8s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="936" cy="92" r="3.4" fill="url(#moteGold)">
            <animate attributeName="cy" values="92;68;92" dur="8.6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.1;0.7;0.1" dur="6.2s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="280" cy="268" r="2.6" fill="url(#moteGold)">
            <animate attributeName="cy" values="268;242;268" dur="10.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.06;0.46;0.06" dur="7.4s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1008" cy="278" r="2.6" fill="url(#moteGold)">
            <animate attributeName="cy" values="278;252;278" dur="11.2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.06;0.46;0.06" dur="7.1s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="196" cy="470" r="2.4" fill="url(#moteGold)">
            <animate attributeName="cy" values="470;446;470" dur="12s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.04;0.38;0.04" dur="7.9s"
                repeatCount="indefinite" />
        </circle>
        <circle cx="1086" cy="480" r="2.4" fill="url(#moteGold)">
            <animate attributeName="cy" values="480;456;480" dur="12.3s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.04;0.38;0.04" dur="8.3s"
                repeatCount="indefinite" />
        </circle>
    </g>

    <!-- very soft ambient haze near top -->
    <g opacity="0.25" filter="url(#blurMed)">
        <ellipse cx="260" cy="92" rx="120" ry="22" fill="#7fd8ff">
            <animate attributeName="opacity" values="0.08;0.18;0.08" dur="14s"
                repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="1016" cy="88" rx="130" ry="24" fill="#e4c46d">
            <animate attributeName="opacity" values="0.06;0.16;0.06" dur="15s"
                repeatCount="indefinite" />
        </ellipse>
    </g>
</svg>