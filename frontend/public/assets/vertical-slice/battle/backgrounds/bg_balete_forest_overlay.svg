<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
    <defs>
        <linearGradient id="mistGradA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#DDEFE6" stop-opacity="0" />
            <stop offset="38%" stop-color="#DDEFE6" stop-opacity="0.16" />
            <stop offset="72%" stop-color="#C8E3D7" stop-opacity="0.11" />
            <stop offset="100%" stop-color="#DDEFE6" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="mistGradB" x1="1" y1="0" x2="0" y2="0">
            <stop offset="0%" stop-color="#C7E2D5" stop-opacity="0" />
            <stop offset="42%" stop-color="#DDF3EA" stop-opacity="0.13" />
            <stop offset="70%" stop-color="#AFCFBE" stop-opacity="0.09" />
            <stop offset="100%" stop-color="#C7E2D5" stop-opacity="0" />
        </linearGradient>

        <radialGradient id="fireflyGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF7A6" stop-opacity="0.8" />
            <stop offset="45%" stop-color="#CFFF7A" stop-opacity="0.28" />
            <stop offset="100%" stop-color="#CFFF7A" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="humidGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#BFEFD7" stop-opacity="0.12" />
            <stop offset="70%" stop-color="#BFEFD7" stop-opacity="0.04" />
            <stop offset="100%" stop-color="#BFEFD7" stop-opacity="0" />
        </radialGradient>

        <filter id="mistBlur" x="-20%" y="-60%" width="140%" height="220%">
            <feGaussianBlur stdDeviation="14" />
        </filter>

        <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" />
        </filter>

        <filter id="tinyBlur" x="-70%" y="-70%" width="240%" height="240%">
            <feGaussianBlur stdDeviation="1.4" />
        </filter>

        <symbol id="topLeafA" viewBox="-10 -6 20 12">
            <path d="M-9 1C-4.5-5.2 4.2-5.4 9-0.8C4.2 3.2-3.8 5.2-9 1Z" fill="#4F7F54"
                opacity="0.36" />
            <path d="M-6.5 0.7C-2.5-0.5 2.4-0.9 6.8-0.8" stroke="#B9D58F" stroke-width="0.7"
                stroke-linecap="round" opacity="0.22" />
        </symbol>

        <symbol id="topLeafB" viewBox="-8 -5 16 10">
            <path d="M-7 0.4C-3.8-4.6 3.8-4.5 7-0.2C3.8 3.9-3.5 4.8-7 0.4Z" fill="#5A8B5B"
