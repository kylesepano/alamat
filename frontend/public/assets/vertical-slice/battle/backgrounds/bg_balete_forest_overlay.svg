<svg xmlns="http://www.w3.org/2000/svg"
    width="1280"
    height="720"
    viewBox="0 0 1280 720"
    fill="none">

    <defs>
        <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" />
        </filter>

        <filter id="blur6" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" />
        </filter>

        <filter id="blur12" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="12" />
        </filter>

        <filter id="blur20" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="20" />
        </filter>

        <radialGradient id="fireflyGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d8f18a" stop-opacity="0.95" />
            <stop offset="35%" stop-color="#b8dc68" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#b8dc68" stop-opacity="0" />
        </radialGradient>

        <linearGradient id="mistGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#c7d2c1" stop-opacity="0" />
            <stop offset="50%" stop-color="#d7e2d0" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#c7d2c1" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="humidShimmer" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#afc7a8" stop-opacity="0" />
            <stop offset="50%" stop-color="#d5e6cf" stop-opacity="0.045" />
            <stop offset="100%" stop-color="#afc7a8" stop-opacity="0" />
        </linearGradient>

        <symbol id="leaf" viewBox="0 0 28 14">
            <path d="M2 7C7 1 18 1 26 7C18 13 7 13 2 7Z"
                fill="#5f7352"
                fill-opacity="0.22" />
            <path d="M4 7H24"
                stroke="#7e9870"
                stroke-opacity="0.18"
                stroke-width="0.8" />
        </symbol>
    </defs>

    <!-- Low drifting mist kept mostly away from the lower center -->
    <g filter="url(#blur20)">
        <ellipse cx="215" cy="180" rx="220" ry="58" fill="url(#mistGrad)" opacity="0.13">
            <animate attributeName="cx" values="215;255;215" dur="28s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.14;0.08" dur="28s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="1030" cy="205" rx="210" ry="54" fill="url(#mistGrad)" opacity="0.11">
            <animate attributeName="cx" values="1030;980;1030" dur="32s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.06;0.12;0.06" dur="32s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="650" cy="255" rx="170" ry="34" fill="url(#mistGrad)" opacity="0.07">
            <animate attributeName="cx" values="650;690;650" dur="35s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.04;0.08;0.04" dur="35s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="155" cy="540" rx="120" ry="34" fill="url(#mistGrad)" opacity="0.05">
            <animate attributeName="cx" values="155;190;155" dur="30s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.02;0.06;0.02" dur="30s"
                repeatCount="indefinite" />
        </ellipse>

        <ellipse cx="1125" cy="560" rx="110" ry="28" fill="url(#mistGrad)" opacity="0.045">
            <animate attributeName="cx" values="1125;1088;1125" dur="34s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.02;0.05;0.02" dur="34s"
                repeatCount="indefinite" />
        </ellipse>
    </g>

    <!-- Irregular firefly pulses -->
    <g filter="url(#blur2)">
        <circle r="5" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="145;143;147;145" dur="7.6s" repeatCount="indefinite" />
            <animate attributeName="cy" values="445;440;447;445" dur="7.6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.08;0.32;0.12;0;0.22;0" dur="7.6s"
                repeatCount="indefinite" />
        </circle>

        <circle r="4.5" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="300;304;298;300" dur="9.1s" repeatCount="indefinite" />
            <animate attributeName="cy" values="370;365;372;370" dur="9.1s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.18;0.05;0.26;0;0.12;0" dur="9.1s"
                repeatCount="indefinite" />
        </circle>

        <circle r="4" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="520;524;516;520" dur="6.8s" repeatCount="indefinite" />
            <animate attributeName="cy" values="300;295;302;300" dur="6.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.24;0.08;0.28;0" dur="6.8s"
                repeatCount="indefinite" />
        </circle>

        <circle r="4.8" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="760;765;758;760" dur="8.7s" repeatCount="indefinite" />
            <animate attributeName="cy" values="410;404;412;410" dur="8.7s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.10;0.30;0.06;0.21;0" dur="8.7s"
                repeatCount="indefinite" />
        </circle>

        <circle r="4.3" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="920;926;917;920" dur="10.2s"
                repeatCount="indefinite" />
            <animate attributeName="cy" values="338;332;340;338" dur="10.2s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.16;0.04;0.26;0.11;0" dur="10.2s"
                repeatCount="indefinite" />
        </circle>

        <circle r="5.2" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="1110;1104;1114;1110" dur="7.9s"
                repeatCount="indefinite" />
            <animate attributeName="cy" values="260;256;262;260" dur="7.9s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.20;0.05;0.33;0;0.14;0" dur="7.9s"
                repeatCount="indefinite" />
        </circle>

        <circle r="3.8" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="1008;1013;1007;1008" dur="11.4s"
                repeatCount="indefinite" />
            <animate attributeName="cy" values="468;462;469;468" dur="11.4s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.09;0.22;0.07;0;0.18;0" dur="11.4s"
                repeatCount="indefinite" />
        </circle>

        <circle r="3.6" fill="url(#fireflyGlow)">
            <animate attributeName="cx" values="218;224;219;218" dur="12.7s"
                repeatCount="indefinite" />
            <animate attributeName="cy" values="262;258;264;262" dur="12.7s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.13;0.03;0.17;0.05;0" dur="12.7s"
                repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Restrained leaf movement at upper edges -->
    <g opacity="0.9">
        <g transform="translate(90 50)">
            <use href="#leaf" width="28" height="14" />
            <animateTransform attributeName="transform"
                type="translate"
                values="90 50; 98 57; 92 64; 90 50"
                dur="13s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="-4 14 7; 3 14 7; -2 14 7; -4 14 7"
                dur="13s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.18;0.12;0.08" dur="13s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(235 72)">
            <use href="#leaf" width="28" height="14" />
            <animateTransform attributeName="transform"
                type="translate"
                values="235 72; 243 76; 238 84; 235 72"
                dur="15s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="2 14 7; -4 14 7; 1 14 7; 2 14 7"
                dur="15s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.07;0.15;0.11;0.07" dur="15s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(1020 56)">
            <use href="#leaf" width="28" height="14" />
            <animateTransform attributeName="transform"
                type="translate"
                values="1020 56; 1012 61; 1018 68; 1020 56"
                dur="14s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="4 14 7; -3 14 7; 2 14 7; 4 14 7"
                dur="14s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.08;0.17;0.12;0.08" dur="14s"
                repeatCount="indefinite" />
        </g>

        <g transform="translate(1145 86)">
            <use href="#leaf" width="28" height="14" />
            <animateTransform attributeName="transform"
                type="translate"
                values="1145 86; 1137 92; 1141 98; 1145 86"
                dur="16s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                additive="sum"
                type="rotate"
                values="-3 14 7; 4 14 7; -2 14 7; -3 14 7"
                dur="16s"
                repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.06;0.14;0.10;0.06" dur="16s"
                repeatCount="indefinite" />
        </g>
    </g>

    <!-- Slow humid shimmer -->
    <g filter="url(#blur12)">
        <rect x="120" y="470" width="1040" height="115" fill="url(#humidShimmer)" opacity="0.14">
            <animate attributeName="opacity" values="0.06;0.14;0.08;0.13;0.06" dur="12s"
                repeatCount="indefinite" />
        </rect>

        <rect x="210" y="515" width="860" height="82" fill="url(#humidShimmer)" opacity="0.08">
            <animate attributeName="opacity" values="0.03;0.09;0.04;0.08;0.03" dur="9.5s"
                repeatCount="indefinite" />
        </rect>
    </g>

    <!-- Almost-imperceptible root-shadow shift near edges -->
    <g filter="url(#blur6)">
        <path
            d="M34 92C62 142 72 205 60 274C46 358 44 460 66 548C75 584 79 624 72 676L0 676L0 78C15 80 24 84 34 92Z"
            fill="#081008"
            opacity="0.10">
            <animate attributeName="opacity" values="0.07;0.11;0.08;0.10;0.07" dur="18s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                type="translate"
                values="0 0; 5 2; 0 0"
                dur="18s"
                repeatCount="indefinite" />
        </path>

        <path
            d="M1248 118C1226 162 1216 219 1222 292C1229 382 1234 483 1217 560C1207 606 1203 640 1208 676L1280 676L1280 104C1268 106 1258 110 1248 118Z"
            fill="#081008"
            opacity="0.095">
            <animate attributeName="opacity" values="0.06;0.10;0.07;0.09;0.06" dur="21s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                type="translate"
                values="0 0; -4 2; 0 0"
                dur="21s"
                repeatCount="indefinite" />
        </path>

        <path
            d="M410 0C446 18 472 42 492 71C516 105 545 116 585 119C617 121 655 115 695 112C748 108 801 118 836 91C863 70 889 27 934 0L934 54C901 78 873 107 835 121C791 137 746 132 698 133C654 135 613 143 574 144C526 145 482 131 447 97C423 74 404 48 410 0Z"
            fill="#0a1209"
            opacity="0.05">
            <animate attributeName="opacity" values="0.03;0.06;0.035;0.05;0.03" dur="24s"
                repeatCount="indefinite" />
            <animateTransform attributeName="transform"
                type="translate"
                values="0 0; 0 2; 0 0"
                dur="24s"
                repeatCount="indefinite" />
        </path>
    </g>

</svg>