            <animateTransform attributeName="transform" type="translate" values="-18 0;18 4;-18 0"
                dur="18s" repeatCount="indefinite" />
        </ellipse>
        <ellipse cx="640" cy="520" rx="500" ry="70" fill="url(#humidGlow)" opacity="0.16">
