                <animate attributeName="opacity" values="0.06;0.24;0.08;0.2;0.06" dur="10s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="12 0;-22 2;12 0" dur="13s" repeatCount="indefinite" />
            </path>
            <path d="M710 288 C780 280 835 294 902 286 S1035 281 1105 290" fill="none"
