<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="waterLineA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#baf7ff" stop-opacity="0" />
            <stop offset="0.35" stop-color="#d9ffff" stop-opacity="0.42" />
            <stop offset="0.65" stop-color="#8ce7ff" stop-opacity="0.28" />
            <stop offset="1" stop-color="#baf7ff" stop-opacity="0" />
        </linearGradient> ``` <linearGradient
            id="waterLineB" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#fff7c8" stop-opacity="0" />
            <stop offset="0.45" stop-color="#fff4ab" stop-opacity="0.32" />
            <stop offset="0.75" stop-color="#baf7ff" stop-opacity="0.2" />
            <stop offset="1" stop-color="#fff7c8" stop-opacity="0" />
        </linearGradient>

<radialGradient
            id="glintGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#fff8b8" stop-opacity="0.95" />
            <stop offset="0.35" stop-color="#d8fff0" stop-opacity="0.5" />
            <stop offset="1" stop-color="#d8fff0" stop-opacity="0" />
        </radialGradient>

<filter
            id="softBlur" x="-30%" y="-80%" width="160%" height="260%">
            <feGaussianBlur stdDeviation="2.4" />
        </filter>

<filter id="tinyGlow" x="-300%"
            y="-300%" width="700%" height="700%">
            <feGaussianBlur stdDeviation="2.2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter> ``` </defs>

    <g id="distant-water-shimmer" opacity="0.72">
        <g>
            <path d="M170 284 C230 278 292 291 354 284 S484 277 548 286" fill="none"
                stroke="url(#waterLineA)" stroke-width="3.2" stroke-linecap="round"
                filter="url(#softBlur)">
                <animate attributeName="opacity" values="0.08;0.34;0.12;0.28;0.08" dur="8.5s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="-16 0;18 1;-16 0" dur="11s" repeatCount="indefinite" />
            </path>
            <path d="M435 318 C504 309 554 326 620 317 S760 309 834 320" fill="none"
