                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="-8 0;14 0;-8 0"
                    dur="10.6s" repeatCount="indefinite" />
            </path>
            <path d="M670 374 C745 366 812 381 882 373 S1038 365 1124 377" fill="none"
                stroke="url(#waterLineB)" stroke-width="2.2" stroke-linecap="round">
                <animate attributeName="opacity" values="0.05;0.17;0.07;0.14;0.05" dur="9.4s"
                    repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate"
                    values="10 0;-12 1;10 0" dur="12s" repeatCount="indefinite" />
            </path>
        </g>
        ``` </g>

