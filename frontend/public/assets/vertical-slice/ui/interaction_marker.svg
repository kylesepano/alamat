<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF2A8" stop-opacity="0.65" />
      <stop offset="55%" stop-color="#F2B84B" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#F2B84B" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="wovenGold" x1="16" y1="12" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF0A8" />
      <stop offset="35%" stop-color="#D99A2B" />
      <stop offset="70%" stop-color="#FFE08A" />
      <stop offset="100%" stop-color="#A8641B" />
    </linearGradient>

    <linearGradient id="darkGold" x1="17" y1="15" x2="47" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B541B" />
      <stop offset="100%" stop-color="#4F2E10" />
    </linearGradient>

    <filter id="softPulseGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur">
        <animate attributeName="stdDeviation" values="1.2;2.4;1.2" dur="1.8s"
          repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="25" fill="url(#goldGlow)" opacity="0.55">
    <animate attributeName="opacity" values="0.32;0.72;0.32" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <g id="markerCore">
    <animateTransform attributeName="transform" type="scale" additive="sum"
      values="1 1;1.025 1.025;1 1" dur="2.4s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1" keyTimes="0;0.5;1" />
    <circle cx="32" cy="32" r="17.5" stroke="url(#darkGold)" stroke-width="8.5" opacity="0.95" />
    <circle cx="32" cy="32" r="17.5" stroke="url(#wovenGold)" stroke-width="6.2"
      stroke-linecap="round" filter="url(#softPulseGlow)" />

    <path d="M18.5 25.5C22.5 17.4 31.7 13.3 40.4 16.2"
      stroke="#FFF3B0" stroke-width="2.8" stroke-linecap="round" opacity="0.95" />
    <path d="M45.4 22.8C50.1 30.2 48.6 40.5 41.5 46.1"
      stroke="#B66B1E" stroke-width="2.8" stroke-linecap="round" opacity="0.8" />
    <path d="M38.5 48.3C30.4 52.2 20.8 49.1 16.9 41.2"
      stroke="#FFE18A" stroke-width="2.8" stroke-linecap="round" opacity="0.9" />
    <path d="M16.3 37.4C13.9 29.6 17.4 20.9 24.8 17.1"
      stroke="#8D5318" stroke-width="2.8" stroke-linecap="round" opacity="0.75" />

    <circle cx="32" cy="32" r="8.2" fill="#2B1B0A" opacity="0.18" />
    <circle cx="32" cy="32" r="5.8" fill="#FFE69A" opacity="0.25">
      <animate attributeName="opacity" values="0.16;0.36;0.16" dur="1.8s" repeatCount="indefinite" />
    </circle>
  </g>
  <g transform="translate(47 16)">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.35s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" additive="sum" values="0.78;1.12;0.78"
      dur="1.35s" repeatCount="indefinite" />
    <path d="M0 -4L1.1 -1.1L4 0L1.1 1.1L0 4L-1.1 1.1L-4 0L-1.1 -1.1Z" fill="#FFF5B8" />
    <path d="M0 -2.2L0.6 -0.6L2.2 0L0.6 0.6L0 2.2L-0.6 0.6L-2.2 0L-0.6 -0.6Z" fill="#F2B84B" />
  </g>
  <g transform="translate(20 47)">
    <animate attributeName="opacity" values="0.18;0.82;0.18" dur="1.8s" begin="0.45s"
      repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" additive="sum" values="0.75;1.05;0.75"
      dur="1.8s" begin="0.45s" repeatCount="indefinite" />
    <path d="M0 -3L0.8 -0.8L3 0L0.8 0.8L0 3L-0.8 0.8L-3 0L-0.8 -0.8Z" fill="#FFE8A1" />
  </g>
  <g transform="translate(15 20)">
    <animate attributeName="opacity" values="0.12;0.65;0.12" dur="2.1s" begin="0.9s"
      repeatCount="indefinite" />
    <circle cx="0" cy="0" r="1.6" fill="#FFF1AA" />
  </g>
</svg>